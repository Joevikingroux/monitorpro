[mypy]
python_version = 3.11
ignore_missing_imports = True
plugins = sqlalchemy.ext.mypy.plugin

# SQLAlchemy ORM Column[] types require Mapped[] annotations for full
# mypy compatibility. Until models are migrated to Mapped[] style,
# suppress these false positives from plain Column() definitions.
disable_error_code = assignment, arg-type, call-overload, attr-defined
