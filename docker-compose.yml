services:

  db:
    image: timescale/timescaledb:latest-pg16
    ports:
      - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_DB: pcmonitor
      POSTGRES_USER: pcmonitor
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pcmonitor"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "127.0.0.1:8888:8888"
    environment:
      DATABASE_URL: postgresql+asyncpg://pcmonitor:${DB_PASSWORD}@db:5432/pcmonitor
      SECRET_KEY: ${SECRET_KEY}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-alerts@numbers10.co.za}
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://localhost:8443}
      DASHBOARD_URL: ${DASHBOARD_URL:-https://localhost:8443}
      RETENTION_DAYS: ${RETENTION_DAYS:-90}
      ALERT_CHECK_INTERVAL: ${ALERT_CHECK_INTERVAL:-30}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "127.0.0.1:3030:80"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "8443:8443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./certbot-webroot:/var/www/certbot:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  pgdata:
